<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoAgri Live Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { background-color: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
    #map { flex: 1; border-radius: 0.5rem; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .log-panel { max-height: 200px; overflow-y: auto; background-color: #1e293b; border-radius: 0.5rem; padding: 1rem; margin-top: 1rem; font-family: monospace;}
    .pulse-dot {
      width: 12px; height: 12px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body class="p-6">
  
  <header class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-extrabold text-emerald-400">NeoAgri CommandCenter</h1>
      <p class="text-slate-400 text-sm">Live Drone Monitoring & Epidemic Forecasting</p>
    </div>
    <div class="flex items-center space-x-3">
      <span class="pulse-dot bg-emerald-500"></span>
      <span class="text-emerald-400 font-semibold tracking-wider uppercase text-sm">System Online</span>
    </div>
  </header>

  <div class="flex-1 flex flex-col md:flex-row gap-6">
    <!-- Map Container -->
    <div class="w-full md:w-3/4 flex flex-col">
      <div id="map"></div>
    </div>
    
    <!-- Stats & Logs -->
    <div class="w-full md:w-1/4 flex flex-col space-y-4">
      
      <!-- Stats Box -->
      <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
        <h3 class="font-bold text-slate-300 mb-2 uppercase text-xs tracking-widest">Global Stats</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-slate-900 p-3 rounded text-center">
            <div class="text-xs text-slate-400">Drone Sessions</div>
            <div class="text-2xl font-bold text-indigo-400" id="stat-sessions">0</div>
          </div>
          <div class="bg-slate-900 p-3 rounded text-center">
            <div class="text-xs text-slate-400">Diseases Found</div>
            <div class="text-2xl font-bold text-rose-400" id="stat-diseases">0</div>
          </div>
        </div>
      </div>

      <!-- Feed -->
      <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex-1 flex flex-col">
        <h3 class="font-bold text-slate-300 mb-2 uppercase text-xs tracking-widest">Live Event Feed</h3>
        <div id="event-log" class="log-panel flex-1 text-sm text-green-300 space-y-2">
          <div>[SYSTEM] Listening for drone uplinks...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Default location (e.g., ABV IIITM or a farm in MP)
    const DEFAULT_LAT = 26.2495;
    const DEFAULT_LNG = 78.1740;
    
    const map = L.map('map').setView([DEFAULT_LAT, DEFAULT_LNG], 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
    }).addTo(map);

    const droneIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063822.png',
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });
    
    const diseaseIcon = L.divIcon({
      className: 'pulse-dot',
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });

    let stats = { sessions: 0, diseases: 0 };
    const logs = document.getElementById('event-log');
    const updateStats = () => {
      document.getElementById('stat-sessions').innerText = stats.sessions;
      document.getElementById('stat-diseases').innerText = stats.diseases;
    };

    const addLog = (msg, isError = false) => {
      const d = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = isError ? 'text-rose-400' : 'text-blue-300';
      div.innerHTML = `[${d}] ${msg}`;
      logs.prepend(div);
    };

    // Socket.io connection
    const socket = io();

    socket.on('connect', () => {
      addLog('WebSocket Connection Established.', false);
    });

    // Handle new Drone Session from website_station_backend (Mock Drone)
    socket.on('new_drone_session', (data) => {
      stats.sessions++;
      addLog(`DRONE SYNC: Farm ${data.farmId} by ${data.phone}. ${data.markers.length} captures.`);
      
      data.markers.forEach(m => {
        if(m.type === 'leaf_capture') {
          const p = m.payload;
          if (p.model_result && p.model_result.disease) {
            stats.diseases++;
            // Plot on Map
            L.marker([p.latitude, p.longitude], { icon: diseaseIcon })
              .addTo(map)
              .bindPopup(`<b>${p.model_result.disease}</b><br/>Confidence: ${(p.model_result.confidence*100).toFixed(1)}%`);
          }
          // Center map to last point
          map.flyTo([p.latitude, p.longitude], 16);
        }
      });
      updateStats();
    });

    // Handle manual scan syncs
    socket.on('new_manual_scans', (data) => {
      addLog(`MANUAL SYNC: ${data.phone} uploaded ${data.scans.length} verified scans.`);
      data.scans.forEach(s => {
        stats.diseases++;
        L.marker([s.latitude, s.longitude], { icon: diseaseIcon })
          .addTo(map)
          .bindPopup(`<b>Farmer Confirmed: ${s.disease}</b><br/>Confidence: ${(s.confidence*100).toFixed(1)}%`);
        map.flyTo([s.latitude, s.longitude], 16);
      });
      updateStats();
    });

  </script>
</body>
</html>
